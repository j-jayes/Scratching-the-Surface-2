# ResNet50 fine-tune v4 — Focal Loss (γ=2) to focus on hard examples.
# Warm start from best available checkpoint (v3 if it ran, otherwise v2).
# Focal loss helps on imbalanced data by down-weighting easy negatives.
#
# Run only if best kolektor F1 is still below 0.65:
#   uv run python scripts/finetune_resnet_kolektor.py --config configs/resnet50_kolektor_ft_v4.yaml
model: resnet50
input_size: 224
batch_size: 32
epochs: 15              # warm start — fewer epochs needed
lr: 3.0e-5              # conservative LR for focal loss fine-tuning
backbone_lr_factor: 0.1 # discriminative LR — backbone stays mostly frozen
weight_decay: 1.0e-4
num_workers: 0
seed: 42
threshold: 0.5
augmentation: rrc       # RandomResizedCrop — covers tall kolektor images
kolektor_holdout_frac: 0.20
kolektor_oversample_factor: 3.0
tta_eval: true          # 3-crop TTA at evaluation

# Focal loss — focuses training on hard/uncertain examples
loss_fn: focal
focal_gamma: 2.0

pretrained_weights: models/resnet50_kolektor_ft_v3_best.pt  # warm start from v3 (or change to v2)
checkpoint: models/resnet50_kolektor_ft_v4_best.pt
results_dir: results/resnet50_kolektor_ft_v4

# Training: kolektor domain + severstal (same as v1/v2/v3)
train_manifests:
  - data/processed/kolektor_manifest.parquet
  - data/processed/severstal_manifest.parquet
  - data/processed/neu_det_manifest.parquet

# Validation: severstal val
val_manifests:
  - data/processed/severstal_manifest.parquet

# Evaluation sets (same as previous versions for direct comparison)
eval_sets:
  severstal_test:
    manifests: [data/processed/severstal_manifest.parquet]
    split: test
  kolektor_test:
    manifests: [data/processed/kolektor_manifest.parquet]
    split: test
  gc10_test:
    manifests: [data/processed/gc10_manifest.parquet]
    split: test
    supplement_normals_from: data/processed/severstal_manifest.parquet
    supplement_split: test
